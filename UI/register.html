<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Thần Số Học</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5" style="max-width: 400px;">
        <h2 class="text-center mb-4">Đăng ký</h2>
        <div id="alertBox" class="alert d-none" role="alert"></div>
        <form id="registerForm">
            <div class="mb-3">
                <label for="username" class="form-label">Tên người dùng</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Đăng ký</button>
        </form>
        <div class="mt-3 text-center">
            <p>Đã có tài khoản? <a href="login.html" class="text-info">Đăng nhập</a></p>
            <p><a href="index.html" class="text-secondary">Về trang chủ</a></p>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const alertBox = document.getElementById("alertBox");

            try {
                const response = await fetch("http://localhost:3000/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = "alert alert-success";
                    alertBox.textContent = data.message + " Đang chuyển hướng...";
                    setTimeout(() => window.location.href = "login.html", 1500);
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.textContent = data.message || "Đăng ký thất bại";
                }
            } catch (err) {
                alertBox.className = "alert alert-danger";
                alertBox.textContent = "Không thể kết nối đến máy chủ";
            }
            alertBox.classList.remove("d-none");
        });
    </script>
</body>
</html>
