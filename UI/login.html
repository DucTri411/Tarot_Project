<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Thần Số Học</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5" style="max-width: 400px;">
        <h2 class="text-center mb-4">Đăng nhập</h2>
        <div id="alertBox" class="alert d-none" role="alert"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
        <div class="mt-3 text-center">
            <p>Chưa có tài khoản? <a href="register.html" class="text-info">Đăng ký ngay</a></p>
            <p><a href="index.html" class="text-secondary">Về trang chủ</a></p>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const alertBox = document.getElementById("alertBox");

            try {
                const response = await fetch("http://localhost:3000/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = "alert alert-success";
                    alertBox.textContent = data.message;
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.textContent = data.message || "Đăng nhập thất bại";
                }
            } catch (err) {
                alertBox.className = "alert alert-danger";
                alertBox.innerHTML = "Không thể kết nối đến máy chủ. <br><small>Hãy đảm bảo bạn đã mở cmd và chạy lệnh <code>node app.js</code> trong thư mục backend.</small>";
            }
            alertBox.classList.remove("d-none");
        });
    </script>
</body>
</html>
