<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>THẦN SỐ HỌC & TAROT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">AstroBunny</a>
            <div class="d-flex" id="authNav">
                <!-- update sau -->
            </div>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1>THẦN SỐ HỌC & TAROT</h1>
        <p class="lead mt-3">Khám phá bản thân qua những con số và lá bài</p>

        <div class="mt-5">
            <a href="numerology.html" class="btn btn-primary btn-lg m-3 px-5">Thần Số Học</a>
            <a href="tarot.html" class="btn btn-warning btn-lg m-3 px-5">Rút Bài Tarot</a>
        </div>
    </div>

    <script>
        function parseJwt (token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const authNav = document.getElementById("authNav");
            const token = localStorage.getItem("token");
            const userStr = localStorage.getItem("user");

            let isLoggedIn = false;

            if (token && userStr) {
                const decodedToken = parseJwt(token);
                if (decodedToken && decodedToken.exp * 1000 > Date.now()) {
                    isLoggedIn = true;
                } else {
                    // Token expired
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                }
            }

            if (isLoggedIn) {
                const user = JSON.parse(userStr);
                authNav.innerHTML = `
                    <span class="navbar-text me-3">Xin chào, <strong>${user.username}</strong>!</span>
                    <button id="logoutBtn" class="btn btn-outline-light btn-sm">Đăng xuất</button>
                `;
                document.getElementById("logoutBtn").addEventListener("click", () => {
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                    window.location.reload();
                });
            } else {
                authNav.innerHTML = `
                    <a href="login.html" class="btn btn-outline-light btn-sm me-2">Đăng nhập</a>
                    <a href="register.html" class="btn btn-light btn-sm">Đăng ký</a>
                `;
            }
        });
    </script>
</body>

</html>
